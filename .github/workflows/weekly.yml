name: Weekly GitHub Star Report

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Resend even if this week is already recorded as sent"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run the pipeline without sending email or recording send status"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: weekly-github-star-report
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          args=()
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m src.main "${args[@]}"

      - name: Commit database changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.sqlite
          if git diff --cached --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "Update weekly ranking database"
            git push
          fi
